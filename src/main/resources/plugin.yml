name: CelestCombat-Xtra
version: '1.0.0'
main: com.shyamstudio.celestcombatXtra.CelestCombatXtra
api-version: '1.21'
authors: [ RaviRai, Nighter ]
description: A simple combat logging plugins
folia-supported: true

soft-depend:
  - WorldGuard
  - PlaceholderAPI
  - Multiverse-Core
  - Worlds

commands:
  celestcombat-xtra:
    description: Main command for CelestCombat Xtra
    usage: /celestcombat-xtra
    aliases: [celestcombat, combat, ccx]

permissions:
  celestcombatxtra.command.use:
    description: Allows players to use all commands of CelestCombat Xtra
    default: op
  celestcombatxtra.update.notify:
    description: Receive update notifications
    default: op
  celestcombatxtra.bypass.tag:
    description: Bypass being tagged in combat (no combat log punishment)
    default: false
  celestcombatxtra.command.config:
    description: Browse and edit plugin config in-game
    default: op
  celestcombatxtra.bypass.enchant_limit:
    description: Bypass enchant level limits
    default: op
  celestcombatxtra.bypass.item_limit:
    description: Bypass item limiter restrictions (per-material caps)
    default: op
  celestcombatxtra.bypass.spear_control:
    description: Bypass spear lunge cooldown and spear damage rules
    default: op