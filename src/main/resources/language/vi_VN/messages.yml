#               Plugin command messages
# ------------------------------------------------------
no_permission:
  message: "&cBạn không có quyền sử dụng lệnh này."
  sound: entity.villager.no

help_message:
  message: |
    &8&m
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    &8                          &7&#F5F5DC&lDANH SÁCH LỆNH
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    &8» &#4A90E2/cc reload &#F5F5DC- Tải lại cấu hình plugin
    &8» &#4A90E2/cc tag &#F5F5DC- Đánh dấu người chơi đang trong combat
    &8» &#4A90E2/cc removeTag player <player> &#F5F5DC- Gỡ trạng thái combat khỏi người chơi
    &8» &#4A90E2/cc removeTag world <world> &#F5F5DC- Gỡ trạng thái combat của toàn bộ người chơi trong một thế giới
    &8» &#4A90E2/cc removeTag all &#F5F5DC- Gỡ trạng thái combat của toàn bộ người chơi trên máy chủ
    &8» &#4A90E2/cc killReward check <player> [target] &#F5F5DC- Kiểm tra thời gian hồi cooldown phần thưởng giết người chơi
    &8» &#4A90E2/cc killReward clear <player> &#F5F5DC- Xóa thời gian hồi cooldown phần thưởng giết của người chơi
    &8» &#4A90E2/cc killReward clearAll &#F5F5DC- Xóa tất cả thời gian hồi cooldown phần thưởng giết trên máy chủ
    &8» &#4A90E2/cc newbieProtection give <player> &#F5F5DC- Cấp bảo vệ cho người chơi mới
    &8» &#4A90E2/cc newbieProtection remove <player> &#F5F5DC- Gỡ bỏ bảo vệ người chơi mới
    &8» &#4A90E2/cc newbieProtection check <player> &#F5F5DC- Kiểm tra trạng thái bảo vệ người chơi mới
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

