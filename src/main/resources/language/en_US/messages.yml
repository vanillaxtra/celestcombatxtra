help_message:
  message: |
    &8&m
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    &8                          &7&#F5F5DC&lCOMMAND LIST
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    &8» &#4A90E2/cc reload &#F5F5DC- Reload the plugin configuration
    &8» &#4A90E2/cc tag &#F5F5DC- Tag players in combat
    &8» &#4A90E2/cc removeTag player <player> &#F5F5DC- Remove a player from combat
    &8» &#4A90E2/cc removeTag world <world> &#F5F5DC- Remove all players from combat in a world
    &8» &#4A90E2/cc removeTag all &#F5F5DC- Remove all players from combat server-wide
    &8» &#4A90E2/cc killReward check <player> [target] &#F5F5DC- Check kill reward cooldown
    &8» &#4A90E2/cc killReward clear <player> &#F5F5DC- Clear kill reward cooldowns for a player
    &8» &#4A90E2/cc killReward clearAll &#F5F5DC- Clear all kill reward cooldowns server-wide
    &8» &#4A90E2/cc newbieProtection give <player> &#F5F5DC- Grant newbie protection to a player
    &8» &#4A90E2/cc newbieProtection remove <player> &#F5F5DC- Remove newbie protection from a player
    &8» &#4A90E2/cc newbieProtection check <player> &#F5F5DC- Check newbie protection status
    &8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

